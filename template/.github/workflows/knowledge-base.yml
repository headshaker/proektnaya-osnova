name: Проверка проектной базы

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  knowledge-base:
    name: База проверяется (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 5
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - windows-latest
    steps:
      - name: Получить репозиторий
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Проверить структуру и ссылки
        shell: pwsh
        run: ./scripts/validate-vault.ps1

      - name: Проверить единую книгу
        shell: pwsh
        run: ./scripts/build-project-dossier.ps1 --check

      - name: Проверить бюджет контекста
        run: python scripts/context-budget.py --strict

      - name: Проверить локальный пакет контекста
        shell: pwsh
        run: ./scripts/build-context.ps1 -Profile compact -IncludeId D-001,Q-001 -Check

      - name: Проверить обработчик вложений
        run: |
          python -m py_compile scripts/source-ingestion.py
          python scripts/source-ingestion.py verify
