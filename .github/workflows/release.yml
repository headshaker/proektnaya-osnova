name: Выпуск шаблона

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: Собрать выпуск
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Получить репозиторий
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Проверить версию
        shell: pwsh
        env:
          RELEASE_TAG: ${{ github.ref_type == 'tag' && github.ref_name || '' }}
        run: ./scripts/check-version.ps1 -Tag $env:RELEASE_TAG

      - name: Проверить выпускной пакет
        shell: pwsh
        run: ./scripts/test-release.ps1

      - name: Собрать файлы выпуска
        shell: pwsh
        run: |
          $version = (Get-Content -Raw VERSION).Trim()
          $package = "dist/proektnaya-osnova-template-v$version.zip"
          ./scripts/export-template.ps1 -OutputPath $package
          "PACKAGE_PATH=$package" >> $env:GITHUB_ENV
          "CHECKSUM_PATH=$package.sha256" >> $env:GITHUB_ENV
          "VERSION=$version" >> $env:GITHUB_ENV

      - name: Сохранить артефакт
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: proektnaya-osnova-template-v${{ env.VERSION }}
          path: |
            ${{ env.PACKAGE_PATH }}
            ${{ env.CHECKSUM_PATH }}
          if-no-files-found: error
          retention-days: 30

      - name: Создать GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create $env:GITHUB_REF_NAME $env:PACKAGE_PATH $env:CHECKSUM_PATH --verify-tag --generate-notes --title "Проектная основа $env:GITHUB_REF_NAME"
