name: Одноразовый запуск восстановления релизов

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/run-backfill-once.yml

permissions:
  actions: write
  contents: read

jobs:
  dispatch:
    name: Запустить восстановление
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Запустить основной workflow
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh workflow run backfill-releases.yml --ref main
