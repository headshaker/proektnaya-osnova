# Одноразовая диагностика наличия токена и запуск восстановления.
name: Одноразовый запуск восстановления релизов

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/run-backfill-once.yml

permissions:
  actions: write
  contents: read
  pull-requests: write

jobs:
  dispatch:
    name: Проверить токен и запустить восстановление
    runs-on: ubuntu-latest
    timeout-minutes: 5
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - name: Проверить RELEASE_TOKEN
        shell: bash
        env:
          RELEASE_TOKEN: ${{ secrets.RELEASE_TOKEN }}
        run: |
          set -euo pipefail
          if [[ -z "$RELEASE_TOKEN" ]]; then
            gh pr comment 11 --body "Одноразовый запуск остановлен: Actions secret \`RELEASE_TOKEN\` отсутствует. Значение секрета не раскрывалось."
            exit 1
          fi
          gh pr comment 11 --body "Actions secret \`RELEASE_TOKEN\` найден. Запускаю workflow восстановления релизов."

      - name: Запустить основной workflow
        shell: bash
        run: |
          set -euo pipefail
          gh workflow run backfill-releases.yml --ref main
          gh pr comment 11 --body "Workflow восстановления релизов успешно поставлен в очередь."
