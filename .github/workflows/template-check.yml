name: Проверка репозитория шаблона

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  template:
    name: Шаблон разворачивается (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - windows-latest
    steps:
      - name: Получить репозиторий
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Выполнить сквозную проверку
        shell: pwsh
        run: |
          ./scripts/test-template.ps1
          ./scripts/test-agent-guides.ps1

  package:
    name: Выпускной пакет
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Получить репозиторий
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Проверить версию и выпускной архив
        shell: pwsh
        run: ./scripts/test-release.ps1
