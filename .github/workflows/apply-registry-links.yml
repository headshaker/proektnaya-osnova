name: Применение ссылок реестров

on:
  push:
    branches:
      - agent/interactive-registry-references
  workflow_dispatch:

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Получить ветку
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          ref: agent/interactive-registry-references
          fetch-depth: 0

      - name: Сформировать ссылки и якоря
        run: python template/scripts/link-registry-references.py --write

      - name: Проверить результат
        shell: pwsh
        run: ./scripts/test-registry-links.ps1

      - name: Зафиксировать изменения
        shell: bash
        run: |
          if git diff --quiet; then
            echo "Изменений нет."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add template '*.md' ':(glob)**/*.md'
          git commit -m "Сделать ссылки на записи реестров интерактивными"
          git push origin HEAD:agent/interactive-registry-references
