name: Подготовка версии 0.7.0

on:
  push:
    branches:
      - agent/interactive-registry-references
  workflow_dispatch:

permissions:
  contents: write

jobs:
  bump:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Получить ветку
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          ref: agent/interactive-registry-references
          fetch-depth: 0

      - name: Согласовать версию и миграции
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          import hashlib
          import json

          root = Path('.')
          template = root / 'template'
          version = '0.7.0'
          previous = '0.6.0'

          def normalized_hash(text: str) -> str:
              normalized = text.replace('\r\n', '\n').replace('\r', '\n').rstrip() + '\n'
              return hashlib.sha256(normalized.encode('utf-8')).hexdigest()

          registry_path = template / 'REGISTRY-SCHEMA.json'
          manifest_path = template / 'migrations/manifest.json'
          baselines_path = template / 'migrations/baselines.json'
          original_registry = registry_path.read_text(encoding='utf-8')
          original_manifest = manifest_path.read_text(encoding='utf-8')
          original_baselines = baselines_path.read_text(encoding='utf-8')

          fixture = root / 'tests/fixtures/v0.6.0'
          fixture.mkdir(parents=True, exist_ok=True)
          (fixture / 'REGISTRY-SCHEMA.json').write_text(original_registry, encoding='utf-8', newline='\n')
          (fixture / 'manifest.json').write_text(original_manifest, encoding='utf-8', newline='\n')
          (fixture / 'baselines.json').write_text(original_baselines, encoding='utf-8', newline='\n')

          (root / 'VERSION').write_text(version + '\n', encoding='utf-8', newline='\n')
          (template / 'TEMPLATE-VERSION').write_text(version + '\n', encoding='utf-8', newline='\n')

          state_path = template / 'TEMPLATE-STATE.json'
          state = json.loads(state_path.read_text(encoding='utf-8'))
          state['templateVersion'] = version
          state_path.write_text(json.dumps(state, ensure_ascii=False, indent=2) + '\n', encoding='utf-8', newline='\n')

          registry = json.loads(original_registry)
          if version not in registry['compatibleTemplateVersions']:
              registry['compatibleTemplateVersions'].append(version)
          registry_path.write_text(json.dumps(registry, ensure_ascii=False, indent=2) + '\n', encoding='utf-8', newline='\n')

          manifest = json.loads(original_manifest)
          manifest['targetVersion'] = version
          if previous not in manifest['supportedFromVersions']:
              manifest['supportedFromVersions'].append(previous)
          link_script = 'scripts/link-registry-references.py'
          if link_script not in manifest['additiveFiles']:
              manifest['additiveFiles'].append(link_script)
          manifest_path.write_text(json.dumps(manifest, ensure_ascii=False, indent=2) + '\n', encoding='utf-8', newline='\n')

          baselines = json.loads(original_baselines)
          baselines['versions'][previous] = {
              'REGISTRY-SCHEMA.json': normalized_hash(original_registry),
              'migrations/baselines.json': normalized_hash(original_baselines),
              'migrations/manifest.json': normalized_hash(original_manifest),
          }
          baselines_path.write_text(json.dumps(baselines, ensure_ascii=False, indent=2) + '\n', encoding='utf-8', newline='\n')

          readme_path = root / 'README.md'
          readme = readme_path.read_text(encoding='utf-8')
          readme = readme.replace('Текущая версия шаблона: **0.6.0**.', 'Текущая версия шаблона: **0.7.0**.')
          readme_path.write_text(readme, encoding='utf-8', newline='\n')

          changelog_path = root / 'CHANGELOG.md'
          changelog = changelog_path.read_text(encoding='utf-8')
          heading = '## 0.7.0 — 2026-07-16'
          if heading not in changelog:
              section = '''## 0.7.0 — 2026-07-16

### Добавлено

- точные интерактивные ссылки на решения, допущения, вопросы и источники по ID реестров;
- стабильные HTML-якоря для записей `D-xxx`, `A-xxx`, `Q-xxx`, `S-xxx` и будущих форматов из схемы;
- локальный преобразователь ссылок реестров и сквозная проверка готового шаблона;
- проверяемое обновление проектов `0.6.0` до `0.7.0`.

### Изменено

- ИИ-оператор обязан после изменения реестров формировать ссылки и проверять отсутствие неинтерактивных известных ID;
- версия шаблона и миграций повышена до `0.7.0` как для новой совместимой функции.

'''
              changelog = changelog.replace('## 0.6.0 — 2026-07-16', section + '## 0.6.0 — 2026-07-16', 1)
          changelog_path.write_text(changelog, encoding='utf-8', newline='\n')

          roadmap_path = root / 'ROADMAP.md'
          roadmap = roadmap_path.read_text(encoding='utf-8')
          old = '''## Возможные направления v0.7

- [ ] машинно-читаемый каталог проектных ролей и навыков;
- [ ] сценарии регулярных обзоров и автоматических напоминаний;
- [ ] шаблоны управленческих комитетов и контрольных рубежей;
- [ ] оценка качества изменений, внесённых агентом;
- [ ] политики доступа для регулируемых и конфиденциальных проектов.
'''
          new = '''## v0.7.0 — интерактивная прослеживаемость

- [x] точные ссылки на решения, допущения, вопросы и источники по ID;
- [x] стабильные якоря записей реестров в GitHub и Obsidian;
- [x] автоматическое преобразование обычных упоминаний известных ID;
- [x] проверка сохранения команд, URL и несуществующих ID;
- [x] миграция проектов с версии 0.6.0.

## Возможные направления v0.8

- [ ] машинно-читаемый каталог проектных ролей и навыков;
- [ ] сценарии регулярных обзоров и автоматических напоминаний;
- [ ] шаблоны управленческих комитетов и контрольных рубежей;
- [ ] оценка качества изменений, внесённых агентом;
- [ ] политики доступа для регулируемых и конфиденциальных проектов.
'''
          if old not in roadmap:
              raise SystemExit('Не найден раздел возможных направлений v0.7 в ROADMAP.md')
          roadmap_path.write_text(roadmap.replace(old, new, 1), encoding='utf-8', newline='\n')

          migrations_path = template / 'MIGRATIONS.md'
          migrations = migrations_path.read_text(encoding='utf-8')
          migrations = migrations.replace('версий `0.1.x–0.6.x`', 'версий `0.1.x–0.7.x`')
          marker = '## Восстановление\n'
          if '## Переход на 0.7.0' not in migrations:
              section = '''## Переход на 0.7.0

Версия `0.7.0` добавляет интерактивную прослеживаемость записей реестров.

- [`scripts/link-registry-references.py`](./scripts/link-registry-references.py) формирует точные якоря и ссылки на существующие ID;
- поддерживаются решения `D-xxx`, допущения `A-xxx`, вопросы `Q-xxx`, источники `S-xxx` и будущие форматы из [`REGISTRY-SCHEMA.json`](./REGISTRY-SCHEMA.json);
- канонические пользовательские файлы не заменяются миграцией;
- после обновления выполните `python scripts/link-registry-references.py --write`, затем `python scripts/link-registry-references.py --check` и просмотрите diff.

'''
              migrations = migrations.replace(marker, section + marker, 1)
          migrations_path.write_text(migrations, encoding='utf-8', newline='\n')

          release_test_path = root / 'scripts/test-release.ps1'
          release_test = release_test_path.read_text(encoding='utf-8')
          needle = "            'scripts/source-ingestion.py',\n"
          addition = needle + "            'scripts/link-registry-references.py',\n"
          if "'scripts/link-registry-references.py'" not in release_test:
              if needle not in release_test:
                  raise SystemExit('Не найдено место для link-registry-references.py в test-release.ps1')
              release_test = release_test.replace(needle, addition, 1)
          release_test_path.write_text(release_test, encoding='utf-8', newline='\n')

          test_path = root / 'scripts/test-migrations.ps1'
          test = test_path.read_text(encoding='utf-8')
          removal_needle = "            'VIRTUAL-SPECIALISTS.md'\n"
          if "            'scripts/link-registry-references.py'\n" not in test:
              test = test.replace(removal_needle, removal_needle.rstrip('\n') + ",\n            'scripts/link-registry-references.py'\n", 1)

          case_marker = "        '0.5.0' {\n"
          if "        '0.6.0' {\n" not in test:
              case = """        '0.6.0' {
            $fixture = Join-Path $root 'tests/fixtures/v0.6.0'
            Copy-FixtureFile $fixture 'REGISTRY-SCHEMA.json' $project 'REGISTRY-SCHEMA.json'
            Copy-FixtureFile $fixture 'manifest.json' $project 'migrations/manifest.json'
            Copy-FixtureFile $fixture 'baselines.json' $project 'migrations/baselines.json'
            Set-StateVersion $project '0.6.0'
        }
"""
              if case_marker not in test:
                  raise SystemExit('Не найден switch 0.5.0 в test-migrations.ps1')
              test = test.replace(case_marker, case + case_marker, 1)

          test_block_marker = "    $project050 = New-ProjectFixture 'from-050' '0.5.0'\n"
          if "$project060 = New-ProjectFixture" not in test:
              block = """    $project060 = New-ProjectFixture 'from-060' '0.6.0'
    & $updater -ProjectPath $project060 -Date '2026-07-16' -Apply
    Assert-Version $project060 '0.7.0'
    if (-not (Test-Path -LiteralPath (Join-Path $project060 'scripts/link-registry-references.py') -PathType Leaf)) {
        throw 'Миграция 0.6.0 не добавила преобразователь ссылок реестров.'
    }
    $state060 = [System.IO.File]::ReadAllText((Join-Path $project060 'TEMPLATE-STATE.json')) | ConvertFrom-Json
    if ($state060.previousTemplateVersion -cne '0.6.0' -or $state060.templateVersion -cne '0.7.0') {
        throw 'TEMPLATE-STATE.json не зафиксировал переход 0.6.0 -> 0.7.0.'
    }
    & (Join-Path $project060 'scripts/validate-vault.ps1')

"""
              if test_block_marker not in test:
                  raise SystemExit('Не найден блок project050 в test-migrations.ps1')
              test = test.replace(test_block_marker, block + test_block_marker, 1)

          replacements = {
              "Assert-Version $project050 '0.6.0'": "Assert-Version $project050 '0.7.0'",
              "$state050.templateVersion -cne '0.6.0'": "$state050.templateVersion -cne '0.7.0'",
              "переход 0.5.0 -> 0.6.0": "переход 0.5.0 -> 0.7.0",
              "Assert-Version $project040 '0.6.0'": "Assert-Version $project040 '0.7.0'",
              "Assert-Version $project030 '0.6.0'": "Assert-Version $project030 '0.7.0'",
              "Assert-Version $project020 '0.6.0'": "Assert-Version $project020 '0.7.0'",
              "Assert-Version $legacy '0.6.0'": "Assert-Version $legacy '0.7.0'",
              "Assert-Version $conflict '0.6.0'": "Assert-Version $conflict '0.7.0'",
              "Сценарии миграции проектов до 0.6.0 пройдены.": "Сценарии миграции проектов до 0.7.0 пройдены.",
          }
          for before, after in replacements.items():
              if before not in test:
                  raise SystemExit(f'Не найден фрагмент test-migrations.ps1: {before}')
              test = test.replace(before, after)
          test_path.write_text(test, encoding='utf-8', newline='\n')
          PY

      - name: Проверить выпуск
        shell: pwsh
        run: ./scripts/test-release.ps1

      - name: Зафиксировать изменения
        shell: bash
        run: |
          if git diff --quiet; then
            echo "Изменений нет."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Подготовить выпуск 0.7.0"
          git push origin HEAD:agent/interactive-registry-references
