name: Диагностика v0.5.0

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  template:
    name: Диагностика шаблона
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Получить ветку без подробного лога
        shell: bash
        run: |
          git clone --quiet --depth 1 --branch "${{ github.head_ref }}" "https://github.com/${{ github.repository }}.git" repo

      - name: Выполнить test-template
        shell: pwsh
        working-directory: repo
        run: ./scripts/test-template.ps1

  release:
    name: Диагностика выпуска
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Получить ветку без подробного лога
        shell: bash
        run: |
          git clone --quiet --depth 1 --branch "${{ github.head_ref }}" "https://github.com/${{ github.repository }}.git" repo

      - name: Проверить согласованность версии
        shell: pwsh
        working-directory: repo
        run: ./scripts/check-version.ps1

      - name: Проверить ingestion
        shell: pwsh
        working-directory: repo
        run: |
          try { $null = & ./scripts/test-ingestion.ps1 *>&1 }
          catch {
            Write-Host "ТОЧНАЯ ОШИБКА INGESTION: $($_.Exception.Message)"
            Write-Host $_.ScriptStackTrace
            exit 1
          }

      - name: Проверить миграции
        shell: pwsh
        working-directory: repo
        run: |
          try { $null = & ./scripts/test-migrations.ps1 *>&1 }
          catch {
            Write-Host "ТОЧНАЯ ОШИБКА MIGRATIONS: $($_.Exception.Message)"
            Write-Host $_.ScriptStackTrace
            exit 1
          }

      - name: Проверить полный выпуск
        shell: pwsh
        working-directory: repo
        run: |
          try { $null = & ./scripts/test-release.ps1 *>&1 }
          catch {
            Write-Host "ТОЧНАЯ ОШИБКА RELEASE: $($_.Exception.Message)"
            Write-Host $_.ScriptStackTrace
            exit 1
          }
