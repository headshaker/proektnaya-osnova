name: Диагностика v0.5.0

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  template:
    name: Диагностика шаблона
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Получить ветку без подробного лога
        shell: bash
        run: |
          git clone --quiet --depth 1 --branch "${{ github.head_ref }}" "https://github.com/${{ github.repository }}.git" repo

      - name: Выполнить test-template
        shell: pwsh
        working-directory: repo
        run: |
          try {
            ./scripts/test-template.ps1
          }
          catch {
            Write-Host "ТОЧНАЯ ОШИБКА: $($_.Exception.Message)"
            Write-Host $_.ScriptStackTrace
            exit 1
          }

  release:
    name: Диагностика выпуска
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Получить ветку без подробного лога
        shell: bash
        run: |
          git clone --quiet --depth 1 --branch "${{ github.head_ref }}" "https://github.com/${{ github.repository }}.git" repo

      - name: Выполнить test-release
        shell: pwsh
        working-directory: repo
        run: |
          try {
            ./scripts/test-release.ps1
          }
          catch {
            Write-Host "ТОЧНАЯ ОШИБКА: $($_.Exception.Message)"
            Write-Host $_.ScriptStackTrace
            exit 1
          }
