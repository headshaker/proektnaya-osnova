name: Диагностика v0.6.0

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  structure:
    name: Диагностика структуры
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Получить ветку
        shell: bash
        run: git clone --quiet --depth 1 --branch "${{ github.head_ref }}" "https://github.com/${{ github.repository }}.git" repo

      - name: Проверить базовый шаблон
        shell: pwsh
        working-directory: repo
        run: |
          try { $null = & ./scripts/test-template.ps1 *>&1 }
          catch {
            Write-Host "ТОЧНАЯ ОШИБКА TEMPLATE: $($_.Exception.Message)"
            Write-Host $_.ScriptStackTrace
            exit 1
          }

      - name: Проверить агентные руководства
        shell: pwsh
        working-directory: repo
        run: |
          try { $null = & ./scripts/test-agent-guides.ps1 *>&1 }
          catch {
            Write-Host "ТОЧНАЯ ОШИБКА AGENT: $($_.Exception.Message)"
            Write-Host $_.ScriptStackTrace
            exit 1
          }

  release:
    name: Диагностика выпуска
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Получить ветку
        shell: bash
        run: git clone --quiet --depth 1 --branch "${{ github.head_ref }}" "https://github.com/${{ github.repository }}.git" repo

      - name: Проверить версию
        shell: pwsh
        working-directory: repo
        run: |
          try { $null = & ./scripts/check-version.ps1 *>&1 }
          catch {
            Write-Host "ТОЧНАЯ ОШИБКА VERSION: $($_.Exception.Message)"
            Write-Host $_.ScriptStackTrace
            exit 1
          }

      - name: Проверить миграции
        shell: pwsh
        working-directory: repo
        run: |
          try { $null = & ./scripts/test-migrations.ps1 *>&1 }
          catch {
            Write-Host "ТОЧНАЯ ОШИБКА MIGRATIONS: $($_.Exception.Message)"
            Write-Host $_.ScriptStackTrace
            exit 1
          }

      - name: Проверить полный выпуск
        shell: pwsh
        working-directory: repo
        run: |
          try { $null = & ./scripts/test-release.ps1 *>&1 }
          catch {
            Write-Host "ТОЧНАЯ ОШИБКА RELEASE: $($_.Exception.Message)"
            Write-Host $_.ScriptStackTrace
            exit 1
          }
