# Диагностируемый и повторяемый процесс восстановления исторических выпусков.
name: Восстановление пропущенных выпусков

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: backfill-releases
  cancel-in-progress: false

jobs:
  backfill:
    name: Восстановить теги и GitHub Releases
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      GH_TOKEN: ${{ github.token }}
      GH_REPO: ${{ github.repository }}
    steps:
      - name: Отметить запуск
        shell: bash
        run: |
          gh pr comment 11 --body "Запущено восстановление релизов: [GitHub Actions run #${GITHUB_RUN_NUMBER}, попытка ${GITHUB_RUN_ATTEMPT}](${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID})."

      - name: Получить полную историю
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Восстановить цепочку выпусков
        shell: bash
        run: |
          set -euo pipefail

          git fetch --force --tags origin

          cat > "$RUNNER_TEMP/releases.tsv" <<'EOF'
          v0.5.0 1382298d52569fbf7e2f92af62ae61798fc94cd4
          v0.6.0 a63d1a61e5ffff20521433b32bc3edad78a727ec
          v0.7.0 0737f2fe652b4330f6c802cf0cc2a5fa6f244b4d
          EOF

          : > "$RUNNER_TEMP/release-summary.md"
          {
            echo "Восстановление цепочки релизов завершено."
            echo
          } >> "$RUNNER_TEMP/release-summary.md"

          while read -r tag target_sha; do
            version="${tag#v}"
            expected_zip="proektnaya-osnova-template-v${version}.zip"
            expected_checksum="${expected_zip}.sha256"

            actual_version="$(git show "${target_sha}:VERSION" | tr -d '\r\n')"
            if [[ "$actual_version" != "$version" ]]; then
              echo "Коммит $target_sha содержит VERSION=$actual_version, ожидалась $version." >&2
              exit 1
            fi

            if git ls-remote --exit-code --tags origin "refs/tags/${tag}" >/dev/null 2>&1; then
              git fetch --force origin "refs/tags/${tag}:refs/tags/${tag}"
              existing_target="$(git rev-list -n 1 "$tag")"
              if [[ "$existing_target" != "$target_sha" ]]; then
                echo "Тег $tag уже указывает на $existing_target вместо $target_sha." >&2
                exit 1
              fi
              echo "Тег $tag уже существует и указывает на правильный коммит."
            else
              gh api --method POST "repos/${GITHUB_REPOSITORY}/git/refs" \
                -f ref="refs/tags/${tag}" \
                -f sha="${target_sha}" >/dev/null
              git fetch --force origin "refs/tags/${tag}:refs/tags/${tag}"
              echo "Создан тег $tag на $target_sha."
            fi

            rebuild_release=false
            if gh release view "$tag" >/dev/null 2>&1; then
              release_json="$(gh release view "$tag" --json isDraft,isPrerelease,assets)"
              has_zip="$(jq -r --arg name "$expected_zip" '[.assets[].name] | index($name) != null' <<<"$release_json")"
              has_checksum="$(jq -r --arg name "$expected_checksum" '[.assets[].name] | index($name) != null' <<<"$release_json")"
              is_draft="$(jq -r '.isDraft' <<<"$release_json")"
              is_prerelease="$(jq -r '.isPrerelease' <<<"$release_json")"
              if [[ "$has_zip" != "true" || "$has_checksum" != "true" || "$is_draft" != "false" || "$is_prerelease" != "false" ]]; then
                echo "Release $tag неполон или имеет неверный статус; пересоздаю."
                gh release delete "$tag" --yes
                rebuild_release=true
              else
                echo "Release $tag уже существует и содержит оба файла выпуска."
              fi
            else
              rebuild_release=true
            fi

            if [[ "$rebuild_release" == "true" ]]; then
              git checkout --detach "$target_sha"
              pwsh -NoProfile -File ./scripts/check-version.ps1 -Tag "$tag"
              pwsh -NoProfile -File ./scripts/test-release.ps1

              package="$RUNNER_TEMP/$expected_zip"
              rm -f "$package" "$package.sha256"
              pwsh -NoProfile -File ./scripts/export-template.ps1 -OutputPath "$package"
              gh release create "$tag" "$package" "$package.sha256" \
                --verify-tag \
                --generate-notes \
                --title "Проектная основа $tag"
            fi

            release_json="$(gh release view "$tag" --json tagName,url,isDraft,isPrerelease,assets)"
            jq -e --arg tag "$tag" --arg zip "$expected_zip" --arg checksum "$expected_checksum" '
              .tagName == $tag and
              .isDraft == false and
              .isPrerelease == false and
              ([.assets[].name] | index($zip) != null) and
              ([.assets[].name] | index($checksum) != null)
            ' <<<"$release_json" >/dev/null

            release_url="$(jq -r '.url' <<<"$release_json")"
            echo "- [$tag]($release_url) → \`$target_sha\`; файлы: \`$expected_zip\`, \`$expected_checksum\`." \
              >> "$RUNNER_TEMP/release-summary.md"
            echo "Release $tag проверен."
          done < "$RUNNER_TEMP/releases.tsv"

          gh pr comment 11 --body-file "$RUNNER_TEMP/release-summary.md"

      - name: Итоговая проверка цепочки
        shell: bash
        run: |
          set -euo pipefail
          for tag in v0.5.0 v0.6.0 v0.7.0; do
            git ls-remote --exit-code --tags origin "refs/tags/${tag}" >/dev/null
            gh release view "$tag" --json tagName,url,assets \
              --jq '{tag: .tagName, url: .url, assets: [.assets[].name]}'
          done

      - name: Сообщить об ошибке
        if: failure()
        shell: bash
        run: |
          gh pr comment 11 --body "Восстановление релизов завершилось ошибкой: [GitHub Actions run #${GITHUB_RUN_NUMBER}, попытка ${GITHUB_RUN_ATTEMPT}](${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID})."
